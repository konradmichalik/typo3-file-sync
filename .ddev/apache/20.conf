<VirtualHost *:80>
    ServerName sub.typo3-file-sync.ddev.site
    ServerAlias *.typo3-file-sync.ddev.site
    DocumentRoot /var/www/html/.Build
    <Directory "/var/www/html/.Build">
  		AllowOverride All
  		Allow from All
	</Directory>
    <Directory "/var/www/html/Tests/Acceptance/Fixtures/remote-files">
        AllowOverride None
        Require all granted
    </Directory>

    RewriteEngine On

    # Fake remote server: serve static test images from fixtures directory
    RewriteCond %{HTTP_HOST} ^remote\.typo3-file-sync\.ddev\.site$
    RewriteRule ^(.*)$ /var/www/html/Tests/Acceptance/Fixtures/remote-files$1 [L]

    # TYPO3 version subdomain routing (13.*, 14.*, etc.)
    RewriteCond %{HTTP_HOST} ^([a-z0-9-]+)\.typo3-file-sync\.ddev\.site$
    RewriteCond %1 !^remote$
    RewriteRule ^(.*)$ /var/www/html/.Build/%1/public/$1 [L]

    RewriteCond %{HTTP:X-Forwarded-Proto} =https
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_FILENAME} -d
    RewriteRule ^(.+[^/])$ https://%{HTTP_HOST}$1/ [redirect,last]
    SetEnvIf X-Forwarded-Proto "https" HTTPS=on
    ErrorLog /dev/stdout
    CustomLog ${APACHE_LOG_DIR}/access.log combined
    Alias "/phpstatus" "/var/www/phpstatus.php"
</VirtualHost>

<VirtualHost *:443>
    ServerName sub.typo3-file-sync.ddev.site
    ServerAlias *.typo3-file-sync.ddev.site
    DocumentRoot /var/www/html/.Build
    <Directory "/var/www/html/.Build">
  		AllowOverride All
  		Allow from All
	</Directory>
    <Directory "/var/www/html/Tests/Acceptance/Fixtures/remote-files">
        AllowOverride None
        Require all granted
    </Directory>

    RewriteEngine On

    # Fake remote server: serve static test images from fixtures directory
    RewriteCond %{HTTP_HOST} ^remote\.typo3-file-sync\.ddev\.site$
    RewriteRule ^(.*)$ /var/www/html/Tests/Acceptance/Fixtures/remote-files$1 [L]

    # TYPO3 version subdomain routing (13.*, 14.*, etc.)
    RewriteCond %{HTTP_HOST} ^([a-z0-9-]+)\.typo3-file-sync\.ddev\.site$
    RewriteCond %1 !^remote$
    RewriteRule ^(.*)$ /var/www/html/.Build/%1/public/$1 [L]

    RewriteCond %{HTTP:X-Forwarded-Proto} =https
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_FILENAME} -d
    RewriteRule ^(.+[^/])$ https://%{HTTP_HOST}$1/ [redirect,last]
    SetEnvIf X-Forwarded-Proto "https" HTTPS=on
    ErrorLog /dev/stdout
    CustomLog ${APACHE_LOG_DIR}/access.log combined
    Alias "/phpstatus" "/var/www/phpstatus.php"

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/master.crt
    SSLCertificateKeyFile /etc/ssl/certs/master.key
</VirtualHost>
